name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm tag (e.g. latest, beta, next)'
        required: true
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: |
          pnpm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          # Determine tag from move or input
          TAG=${{ github.event.inputs.tag || 'latest' }}
          # Check if version contains 'beta' or 'alpha' to auto-tag if via tag push
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then TAG="beta"; fi
          if [[ "${{ github.ref_name }}" == *"alpha"* ]]; then TAG="alpha"; fi
          pnpm publish --no-git-checks --tag $TAG
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken ${GITHUB_TOKEN}
          # GitHub Packages requires the package name to be scoped to the owner
          # We dynamically update the name in package.json for this step if it's not already scoped
          if [[ $(node -p "require('./package.json').name") != "@"* ]]; then
            OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
            # Use @username/package-name
            node -e "const pkg = require('./package.json'); pkg.name = '@' + process.env.OWNER.toLowerCase() + '/' + pkg.name; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2))"
          fi
          pnpm publish --registry https://npm.pkg.github.com/ --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
