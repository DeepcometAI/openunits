name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm tag (e.g. latest, beta, next)'
        required: true
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check OIDC Connection
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✅ OIDC token request URL is available."
          else
            echo "❌ OIDC token request URL is MISSING. Ensure permissions are set to 'id-token: write'."
            exit 1
          fi

      - name: Publish to npm
        run: |
          # Determine tag
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then TAG="beta"; fi
          if [[ "${{ github.ref_name }}" == *"alpha"* ]]; then TAG="alpha"; fi
          
          # Publish to npm using OIDC
          npm publish --registry=https://registry.npmjs.org/ --tag "$TAG" --provenance --access public

      - name: Publish to GitHub Packages
        run: |
          # Setup .npmrc for GPR auth
          pnpm config set //npm.pkg.github.com/:_authToken ${GITHUB_TOKEN}
          
          # GPR requires the package to be scoped to the repository owner
          # We update package.json name ONLY for this step
          if [[ $(node -p "require('./package.json').name") != "@"* ]]; then
            node -e "const pkg = require('./package.json'); pkg.name = '@' + process.env.OWNER.toLowerCase() + '/' + pkg.name; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2))"
          fi
          
          pnpm publish --registry https://npm.pkg.github.com/ --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}